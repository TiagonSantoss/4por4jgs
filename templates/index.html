<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>4por4jgs</title>

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:sans-serif;
            background:#0B1020;
            color:white;
        }

        .logo{
            width:220px;
            margin-bottom:20px;

            filter:
                drop-shadow(0 0 20px rgba(59,130,246,0.4));
        }

        .hero{
            min-height:100vh;

            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;

            text-align:center;

            padding:20px;

            background:
                radial-gradient(circle at top,#000000,#1f1f1f);
        }

        .hero h1{
            font-size:5rem;
            margin:0;
        }

        .hero p{
            color:#CBD5E1;
            max-width:700px;
            font-size:1.2rem;
        }

        .social-title{
            margin-top:30px;
            margin-bottom:16px;

            font-size:1.1rem;
            color:#E2E8F0;
        }

        .socials{
            display:flex;
            gap:14px;

            flex-wrap:wrap;

            justify-content:center;
        }

        .social-button{
            display:inline-block;

            padding:12px 22px;

            background:#111827;
            color:white;

            text-decoration:none;

            border-radius:12px;

            transition:0.2s;
        }

        .social-button:hover{
            background:#1F2937;
            transform:translateY(-2px);
        }

        .youtube{
            background:#DC2626;
        }

        .youtube:hover{
            background:#EF4444;
        }

        .games{
            padding:60px 40px;
        }

        .games h2{
            margin-bottom:30px;
            font-size:2rem;
        }

        .grid{
            display:grid;

            grid-template-columns:
                repeat(auto-fit,minmax(320px,1fr));

            gap:24px;
        }

        .card{
            background:#111827;

            border-radius:20px;

            overflow:hidden;

            transition:0.2s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card img{
            width:100%;
            height:220px;

            object-fit:cover;
        }

        .card-content{
            padding:20px;
        }

        .card-content h3{
            margin-top:0;
        }

        .card-content p{
            color:#94A3B8;
        }

        .button{
            display:inline-block;

            margin-top:10px;

            padding:10px 18px;

            background:#3B82F6;

            border-radius:10px;

            text-decoration:none;

            color:white;

            transition:0.2s;
        }

        .button:hover{
            background:#2563EB;
        }

        footer{
            text-align:center;

            padding:40px;

            color:#64748B;
        }
    </style>
</head>

<body>

<section class="hero">

    <img class="logo"
    src="{{ config.base_url }}img/logo.jpg">

    <h1>4por4jgs</h1>

    <p>
        jogos jogos jogos jogos
    </p>

    <div class="social-title">
        Acompanhe-nos!
    </div>

    <div class="socials">

        <a class="social-button"
        href="https://x.com/4por4jgs"
        target="_blank">
            𝕏 @4por4jgs
        </a>

        <a class="social-button youtube"
        href="https://www.youtube.com/@4por4jgs"
        target="_blank">
            ▶ Youtube @4por4jgs
        </a>

    </div>

</section>

<section class="games">

    <h2>Jogos</h2>

    <div class="grid">

        <div class="card">

            <img
            src="{{ config.base_url }}img/carbonic.jpg">

            <div class="card-content">

                <h3>Carbonic Runner</h3>

                <p>
                    Jogo "Run & Gun" 2D com alta qualidade gráfica.
                </p>

                <a class="button"
                href="https://4by4.itch.io/carbonic-runner"
                target="_blank">
                    Ver Mais
                </a>

            </div>

        </div>

        <div class="card">

            <img
            src="{{ config.base_url }}img/gizmo.jpg">

            <div class="card-content">

                <h3>Gizmo Fighters</h3>

                <p>
                    Jogo no estilo "RogueLike" com perspectiva 2D e alguns <i>twists</i>.
                </p>

                <a class="button"
                href="https://github.com/TiagonSantoss/Artificial-Fighter/tree/gameplay-pathfinding"
                target="_blank">
                    Ver Mais
                </a>

            </div>

        </div>

    </div>

</section>

<footer>
    © 2026 4por4jgs
</footer>

</body>
</html>
